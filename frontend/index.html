<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty-Hubble | AI Browser Automation Agent</title>
    <!-- Google Fonts: Inter & JetBrains Mono for logs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-bg"></div>
    <div class="glowing-orb orb-1"></div>
    <div class="glowing-orb orb-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-satellite-dish pulse-icon"></i>
                <h1>NIFTY<span>HUBBLE</span></h1>
                <span class="badge">WEB AGENT v1.0</span>
            </div>
            <div class="status-bar">
                <span id="connection-status" class="status-disconnected">
                    <span class="status-dot"></span> <span class="status-text">未连接</span>
                </span>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard-grid">
            
            <!-- Left Panel: Configurations -->
            <section class="panel glass-panel config-panel">
                <div class="panel-header">
                    <i class="fa-solid fa-sliders text-cyan"></i>
                    <h2>智能体配置</h2>
                </div>
                <div class="panel-body">
                    <form id="config-form">
                        <!-- Provider Selection -->
                        <div class="form-group">
                            <label for="api-provider">LLM 供应商</label>
                            <div class="select-wrapper">
                                <select id="api-provider" required>
                                    <option value="gemini" selected>Google Gemini</option>
                                    <option value="openai">OpenAI</option>
                                    <option value="deepseek">DeepSeek</option>
                                    <option value="anthropic">Anthropic Claude</option>
                                </select>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <!-- API Key -->
                        <div class="form-group" id="api-key-group">
                            <label for="api-key">API Key</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-key input-icon"></i>
                                <input type="password" id="api-key" placeholder="输入您的 API 密钥..." />
                            </div>
                            <span class="form-tip">留空则优先使用系统环境变量</span>
                        </div>

                        <!-- Model Name -->
                        <div class="form-group">
                            <label for="model-name">模型名称</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-brain input-icon"></i>
                                <input type="text" id="model-name" value="" placeholder="例如: gemini-3.5-flash, gpt-5.5" required />
                            </div>
                        </div>

                        <!-- Target URL -->
                        <div class="form-group">
                            <label for="target-url">初始目标网址</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-globe input-icon"></i>
                                <input type="url" id="target-url" placeholder="https://example.com (可选)" />
                            </div>
                        </div>

                        <!-- Max Steps -->
                        <div class="form-group">
                            <label for="max-steps">最大步数限制</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-shoe-prints input-icon"></i>
                                <input type="number" id="max-steps" min="1" max="100" value="15" required />
                            </div>
                        </div>

                        <!-- Options -->
                        <div class="form-row-checkboxes">
                            <label class="checkbox-container">
                                <input type="checkbox" id="headless-mode" checked>
                                <span class="checkmark"></span>
                                无头模式 (隐藏浏览器)
                            </label>
                        </div>

                        <!-- Goal Prompt -->
                        <div class="form-group">
                            <label for="agent-goal">执行任务目标 (自然语言)</label>
                            <textarea id="agent-goal" placeholder="输入您想让智能体完成的网页操作任务...&#10;例如：在维基百科搜索'人工智能'，点击第一个链接，并总结第一段。" required></textarea>
                        </div>

                        <!-- Action Buttons -->
                        <div class="btn-group">
                            <button type="submit" id="btn-run" class="btn btn-primary">
                                <i class="fa-solid fa-play"></i> 启动智能体
                            </button>
                            <button type="button" id="btn-stop" class="btn btn-danger" disabled>
                                <i class="fa-solid fa-stop"></i> 停止
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Middle Panel: Live View & Internal State -->
            <section class="panel glass-panel live-panel">
                <div class="panel-header">
                    <i class="fa-solid fa-eye text-magenta"></i>
                    <h2>实时网页视图</h2>
                    <div class="step-badge-container">
                        <span id="current-step-badge" class="step-badge">IDLE</span>
                    </div>
                </div>
                <div class="panel-body flex-column">
                    <!-- Browser Live Feed -->
                    <div class="browser-viewport-container">
                        <div class="browser-header">
                            <div class="browser-dots">
                                <span class="dot red"></span>
                                <span class="dot yellow"></span>
                                <span class="dot green"></span>
                            </div>
                            <div class="browser-address" id="browser-address-text">about:blank</div>
                            <div class="browser-reload"><i class="fa-solid fa-rotate-right"></i></div>
                        </div>
                        <div class="browser-screen-wrapper">
                            <img id="live-screenshot" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='60' viewBox='0 0 100 60'><rect width='100' height='60' fill='%2312131a'/><text x='50' y='30' font-family='sans-serif' font-size='4' fill='%23555' text-anchor='middle'>等待智能体启动...</text></svg>" alt="Live browser viewport" />
                            <div class="screen-loader" id="screen-loader" style="display: none;">
                                <div class="spinner"></div>
                                <span id="loader-text">智能体正在思考...</span>
                            </div>
                        </div>
                    </div>

                    <!-- Agent Thoughts -->
                    <div class="thought-card">
                        <div class="thought-card-header">
                            <i class="fa-solid fa-lightbulb text-yellow"></i>
                            <h3>智能体思考过程 (Thought)</h3>
                        </div>
                        <div class="thought-content" id="agent-thought">
                            等待启动... 启动后，这里将实时渲染智能体每一步的分析、计划与决策路径。
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Panel: Console Logs & Output -->
            <section class="panel glass-panel output-panel">
                <div class="panel-header">
                    <i class="fa-solid fa-terminal text-green"></i>
                    <h2>执行日志与结果</h2>
                </div>
                <div class="panel-body flex-column">
                    <!-- Terminal Console -->
                    <div class="terminal-container">
                        <div class="terminal-header">
                            <span>console_logs.log</span>
                            <button id="btn-clear-logs" class="btn-icon" title="清除日志"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                        <div class="terminal-body" id="terminal-logs">
                            <div class="log-line system-log">[SYSTEM] 准备就绪。请输入配置并点击“启动智能体”开始运行。</div>
                        </div>
                    </div>

                    <!-- Final Deliverable Card -->
                    <div class="deliverable-card">
                        <div class="deliverable-header">
                            <i class="fa-solid fa-clipboard-check text-cyan"></i>
                            <h3>最终任务结果</h3>
                        </div>
                        <div class="deliverable-body" id="final-result">
                            <div class="result-placeholder">
                                <i class="fa-solid fa-circle-info"></i>
                                <span>任务完成后，智能体提取出的最终结论或数据将呈现在此处。</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
